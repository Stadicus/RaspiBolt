name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '31 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-message: 'This issue is stale due to 60 days of inactivity. It will be closed in 7 days unless there is new activity.'
          stale-issue-label: 'stale'
          close-issue-message: 'Closed due to inactivity.'
          days-before-pr-stale: 90
          days-before-pr-close: 30
          stale-pr-message: 'This PR is stale due to 90 days of inactivity. It will be closed in 30 days unless there is new activity.'
          stale-pr-label: 'stale'
          close-pr-message: 'Closed due to inactivity.'
