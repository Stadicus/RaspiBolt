<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="RaspiBolt app icon">
  <defs>
    <linearGradient id="amber-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#amber-bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#sheen)"/>
  <!-- Sharp bolt (V4 shape) scaled 8x, centered in the 1024 canvas -->
  <g transform="translate(112 112) scale(8)">
    <polygon points="62,4 24,56 42,56 38,96 76,44 58,44" fill="#ffffff"/>
  </g>
</svg>
