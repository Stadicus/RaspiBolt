services:
  raspibolt-vm:
    build:
      context: .
      dockerfile: Dockerfile
    image: raspibolt-testvm:trixie
    container_name: raspibolt-testvm
    hostname: raspibolt
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - testvm-data:/data
    ports:
      - '127.0.0.1:2222:22'
    stop_grace_period: 10s

volumes:
  testvm-data:
